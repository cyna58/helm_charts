name: backend
replicas: 1

image:
  repository: cyna58/nauka-kubernetes
  pullPolicy: IfNotPresent
  tag: "poe_v1"

service: 
  type: ClusterIP
  port: 3001
  

env:
  mongoSecretName: mongo-secret
  mongoConfigName: mongo-config
  

resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "500m"

