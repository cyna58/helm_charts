apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: {{ .Values.name }}
  type: {{ .Values.service.type }} 
  ports:
  - name: http
    protocol: TCP
    port: {{ .Values.service.port }} 
    targetPort: {{ .Values.service.port }} 
    nodePort: {{ .Values.service.nodePort }} 